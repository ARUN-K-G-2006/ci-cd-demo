name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Compile and Test
      run: mvn clean test
    
    - name: Package
      run: mvn package
    
    - name: Upload JAR
      uses: actions/upload-artifact@v4
      with:
        name: my-app
        path: target/*.jar
